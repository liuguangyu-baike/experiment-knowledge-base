<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实验知识库</title>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h1 class="app-title">实验知识库</h1>
            <span class="header-subtitle">教材实验查询工具</span>
        </div>
    </header>

    <main class="app-main">
        <div class="search-section">
            <div class="search-container">
                <select id="search-field" class="search-field-select">
                    <option value="all">全部</option>
                    <option value="name">实验名称</option>
                    <option value="equipment">实验器材</option>
                    <option value="inquiry_skills">探究知识</option>
                    <option value="purpose">实验目的</option>
                </select>
                <div class="search-input-wrapper">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input
                        type="text"
                        id="search-input"
                        class="search-input"
                        placeholder="输入关键词搜索实验…"
                    >
                    <button id="clear-search" class="clear-btn" title="清除搜索" style="display:none;">&times;</button>
                </div>
            </div>
        </div>

        <div class="content-layout">
            <aside class="filter-panel" id="filter-panel">
                <div class="filter-header">
                    <h2 class="filter-title">筛选</h2>
                    <button id="clear-filters" class="clear-filters-btn">清除全部</button>
                </div>
                <div id="filter-groups"></div>
            </aside>

            <section class="results-section">
                <div class="results-header">
                    <span id="results-count" class="results-count">加载中…</span>
                </div>
                <div id="results-list" class="results-list"></div>
                <div id="no-results" class="no-results" style="display:none;">
                    <p>没有找到匹配的实验</p>
                    <p class="no-results-hint">试试调整筛选条件或更换关键词</p>
                </div>
            </section>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/display.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
